<h2>Оформление заказа</h2>

<form method="post">
    {% csrf_token %}
    {% for basket in baskets %}
    <p> Добрый день {{ basket.user }} </p>
    {% endfor %}
    <input type="text" name="name" placeholder="Ваше имя" required class="form-control mb-2">
    <textarea name="address" placeholder="Адрес доставки" required class="form-control mb-2"></textarea>
    <textarea name="address" placeholder="Контактный телефон" required class="form-control mb-2"></textarea>

    <h4>Ваш заказ:</h4>
    {% for basket in baskets %}
    <p>
         <p>{{ basket.user }} - {{ basket.product.name }} x {{ basket.quantity }} = {{ basket.sum }}
    </p>
    {% endfor %}

    <h3>Итого: {{ baskets.total_sum }}</h3>

    <button type="submit" class="btn btn-success">Подтвердить заказ</button>
