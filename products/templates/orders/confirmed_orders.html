<h2>Подтвержденные заказы2</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Заказ</th>
            <th>Дата</th>
            <th>Товар</th>
            <th>Количество</th>
            <th>Цена</th>
        </tr>
    </thead>
    <tbody>
        {% for order in orders %}
            {% for item in order.items.all %}
            <tr>
                <td>№{{ order.id }}</td>
                <td>{{ order.created }}</td>
                <td>{{ item.product.name }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.price }}</td>
            </tr>
            {% endfor %}
        {% empty %}
        <tr>
            <td colspan="5">Нет заказов</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="/">Вернуться в магазин</a>
